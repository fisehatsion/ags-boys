<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AGS BOYS</title>

<style>

body{
background:black;
color:#00ff99;
font-family:monospace;
text-align:center;
}

button{
background:#001111;
color:#00ff99;
border:1px solid #00ff99;
padding:10px;
margin:5px;
}

input{
padding:8px;
margin:5px;
}

.page{
display:none;
}

.box{
height:250px;
overflow:auto;
border:1px solid #00ff99;
margin:10px;
padding:5px;
}

.friend{
padding:6px;
border-bottom:1px solid #00ff99;
cursor:pointer;
}

</style>

</head>

<body>

<h1>AGS BOYS</h1>

<!-- LOGIN -->

<div id="loginPage" class="page" style="display:block">

<input id="password" placeholder="Enter Password">

<br>

<button onclick="login()">Enter</button>

<br>

<button onclick="forgetPassword()">Forget Password</button>

</div>


<!-- HOME -->

<div id="homePage" class="page">

<h3>Coins: <span id="coinBox">0</span></h3>

<h3>Friends</h3>

<div id="friendList"></div>

<br>

<button onclick="openPage('chatPage')">Chat</button>

<button onclick="openPage('gamesPage')">Games</button>

<button onclick="openPage('storePage')">Store</button>

<button onclick="openPage('bankPage')">Bank</button>

<button onclick="openPage('mailPage')">Mail</button>

</div>


<!-- CHAT -->

<div id="chatPage" class="page">

<h2>Public Chat</h2>

<div id="messages" class="box"></div>

<input id="msg">

<button onclick="sendMessage()">Send</button>

<br><br>

<button onclick="openPage('homePage')">Back</button>

</div>


<!-- GAMES -->

<div id="gamesPage" class="page">

<h2>Games</h2>

<div class="box" id="gameBox"></div>

<button onclick="playGame()">Play Puzzle</button>

<br>

<button onclick="openPage('homePage')">Back</button>

</div>


<!-- STORE -->

<div id="storePage" class="page">

<h2>Store</h2>

<div class="box"></div>

<button onclick="buy('bots',100)">Game AI Bots (100)</button>

<button onclick="buy('chatHelp',300)">AI Chat Helper (300)</button>

<button onclick="buy('film',500)">AI Film Search (500)</button>

<button onclick="buy('aiChat',1000)">AI Chat System (1000)</button>

<br>

<button onclick="openPage('homePage')">Back</button>

</div>


<!-- BANK -->

<div id="bankPage" class="page">

<h2>Bank</h2>

<div class="box" id="bankLog"></div>

<button onclick="borrow(25)">Borrow 25</button>

<button onclick="borrow(30)">Borrow 30</button>

<button onclick="borrow(50)">Borrow 50</button>

<button onclick="borrow(70)">Borrow 70</button>

<br>

<button onclick="payDebt()">Pay Debt</button>

<br>

<button onclick="openPage('homePage')">Back</button>

</div>


<!-- MAIL -->

<div id="mailPage" class="page">

<h2>Mail</h2>

<div id="mailBox" class="box"></div>

<br>

<button onclick="openPage('homePage')">Back</button>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>


<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"PASTE",
authDomain:"PASTE",
databaseURL:"PASTE",
projectId:"PASTE"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();



/* USER */

let user = "user_"+Math.floor(Math.random()*100000);

let coins = 0;

let debt = 0;



/* WEBSITE PASSWORD */

const password = "agsboys";



/* FRIEND PHONE NUMBERS */

const friends = {

"fiseha":"0922986741",
"merawi":"0900044774",
"kidus":"0910003855",
"marken":"0904306090",
"natanim demsew":"0920607048",
"mikias tizazu":"0913269364",
"addis":"0913424637",
"bakes":"0982223246",
"pineal":"0911254265",
"eyosiyas":"0946395152",
"yafet abraham":"0996649990",
"muse":"0913310424",
"ezana":"0911983651",
"aelaf":"0911417142"

};



/* LOGIN */

function login(){

let p = document.getElementById("password").value;

if(p === password){

openPage("homePage");

loadFriends();

loadCoins();

loadMessages();

loadMail();

}else{

alert("Try again");

}

}



/* FORGET PASSWORD */

function forgetPassword(){

let num = prompt("Enter a phone number of someone in this website");

for(let name in friends){

if(friends[name] === num){

alert("Password is: "+password);

return;

}

}

alert("Number not found");

}



/* PAGE SWITCH */

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");

document.getElementById(id).style.display="block";

}



/* FRIEND LIST */

function loadFriends(){

let box = document.getElementById("friendList");

box.innerHTML="";

for(let name in friends){

let d = document.createElement("div");

d.className="friend";

d.innerText=name;

d.onclick=function(){

let p = prompt("Enter password to view phone");

if(p===password){

alert("Phone: "+friends[name]);

}else{

alert("Try again");

}

};

box.appendChild(d);

}

}



/* COINS */

function loadCoins(){

db.ref("users/"+user+"/coins").on("value",snap=>{

coins = snap.val() || 0;

document.getElementById("coinBox").innerText=coins;

});

}



/* CHAT */

function sendMessage(){

let text=document.getElementById("msg").value;

db.ref("messages").push({

user:user,
text:text

});

}



function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let m=snap.val();

let d=document.createElement("div");

d.innerText=m.user+" : "+m.text;

document.getElementById("messages").appendChild(d);

});

}



/* GAME */

function playGame(){

let reward = Math.floor(Math.random()*20)+5;

coins += reward;

db.ref("users/"+user+"/coins").set(coins);

let log=document.getElementById("gameBox");

let d=document.createElement("div");

d.innerText="You solved puzzle and got "+reward+" coins";

log.appendChild(d);

}



/* STORE */

function buy(item,price){

if(coins < price){

alert("Not enough coins");

return;

}

coins -= price;

db.ref("users/"+user+"/coins").set(coins);

db.ref("store/"+user+"/"+item).set(true);

alert("Purchased");

}



/* BANK */

function borrow(amount){

if(debt>0){

alert("Pay your debt first");

return;

}

coins += amount;

debt = amount;

db.ref("users/"+user+"/coins").set(coins);

db.ref("bank/"+user+"/debt").set(debt);

}



function payDebt(){

if(coins < debt){

alert("Not enough coins");

return;

}

coins -= debt;

debt = 0;

db.ref("users/"+user+"/coins").set(coins);

db.ref("bank/"+user+"/debt").set(0);

}



/* MAIL */

function loadMail(){

db.ref("mail/"+user).on("child_added",snap=>{

let m=snap.val();

let d=document.createElement("div");

d.innerText=m;

document.getElementById("mailBox").appendChild(d);

});

}

</script>

</body>
</html>
