<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AGS Boys</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
text-align:center;
}

button{
background:#002222;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
margin:5px;
}

input{
padding:8px;
margin:5px;
}

.page{
display:none;
}

.box{
height:250px;
overflow:auto;
border:1px solid #00ff9c;
margin:10px;
padding:5px;
}

.friend{
border-bottom:1px solid #00ff9c;
padding:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>AGS BOYS</h1>

<div id="login" class="page" style="display:block">

<input id="password" placeholder="Password"><br>

<button onclick="login()">Enter</button>

<br>

<button onclick="forgetPassword()">Forget Password</button>

</div>


<div id="home" class="page">

<h3>Coins: <span id="coins">0</span></h3>

<h3>Friends</h3>

<div id="friends"></div>

<br>

<button onclick="openPage('chat')">Public Chat</button>
<button onclick="openPage('games')">Games</button>
<button onclick="openPage('store')">Store</button>
<button onclick="openPage('bank')">Bank</button>

</div>


<div id="chat" class="page">

<h2>Public Chat</h2>

<div id="messages" class="box"></div>

<input id="msg">

<button onclick="sendMessage()">Send</button>

<br><br>

<button onclick="openPage('home')">Back</button>

</div>


<div id="games" class="page">

<h2>Games</h2>

<div id="gameLog" class="box"></div>

<button onclick="playGame()">Play Game (+10 coins)</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>


<div id="store" class="page">

<h2>Store</h2>

<div id="storeLog" class="box"></div>

<button onclick="buy(100)">AI Game Bots (100)</button>
<button onclick="buy(300)">AI Chat Helper (300)</button>
<button onclick="buy(500)">AI Film Search (500)</button>
<button onclick="buy(1000)">AI Chat System (1000)</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>


<div id="bank" class="page">

<h2>Bank</h2>

<div id="bankLog" class="box"></div>

<button onclick="borrow(25)">Borrow 25</button>
<button onclick="borrow(50)">Borrow 50</button>
<button onclick="borrow(70)">Borrow 70</button>

<br>

<button onclick="pay()">Pay Debt</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>


<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>


<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"PASTE",
authDomain:"PASTE",
databaseURL:"PASTE",
projectId:"PASTE"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let user = "user_"+Math.floor(Math.random()*100000);

let coins = 0;
let debt = 0;

const password="faimse@123";


/* FULL PHONE NUMBERS */

const friends = {

"fiseha":"0922986741",
"merawi":"0900044774",
"kidus":"0910003855",
"marken":"0904306090",
"natanim":"0920607048",
"mikias":"0913269364",
"addis":"0913424637",
"bakes":"0982223246",
"pineal":"0911254265",
"eyosiyas":"0946395152",
"yafet":"0996649990",
"muse":"0913310424",
"ezana":"0911983651",
"aelaf":"0911417142"

};


/* LOGIN */

function login(){

let p=document.getElementById("password").value;

if(p===password){

openPage("home");

loadFriends();
loadCoins();
loadMessages();

}else{

alert("Try again");

}

}


/* FORGET PASSWORD */

function forgetPassword(){

let num=prompt("Enter phone number of someone in this website");

let found=false;

for(let name in friends){

if(friends[name]===num){

alert("Phone verified. Signing in.");

openPage("home");

loadFriends();
loadCoins();
loadMessages();

found=true;

}

}

if(!found){

alert("Phone number not found");

}

}


function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");

document.getElementById(id).style.display="block";

}


/* FRIENDS */

function loadFriends(){

let f=document.getElementById("friends");

f.innerHTML="";

for(let name in friends){

let d=document.createElement("div");

d.className="friend";

d.innerText=name;

d.onclick=function(){

let p=prompt("Enter password");

if(p===password){

alert("Phone: "+friends[name]);

}else{

alert("Try again");

}

};

f.appendChild(d);

}

}


/* COINS */

function loadCoins(){

db.ref("users/"+user+"/coins").on("value",snap=>{

coins=snap.val()||0;

document.getElementById("coins").innerText=coins;

});

}


/* CHAT */

function sendMessage(){

let text=document.getElementById("msg").value;

db.ref("messages").push({

user:user,
text:text

});

}

function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let m=snap.val();

let d=document.createElement("div");

d.innerText=m.user+" : "+m.text;

document.getElementById("messages").appendChild(d);

});

}


/* GAME */

function playGame(){

coins+=10;

db.ref("users/"+user+"/coins").set(coins);

let d=document.createElement("div");

d.innerText="You earned 10 coins";

document.getElementById("gameLog").appendChild(d);

}


/* STORE */

function buy(price){

if(coins<price){

alert("Not enough coins");

return;

}

coins-=price;

db.ref("users/"+user+"/coins").set(coins);

}


/* BANK */

function borrow(amount){

if(debt>0){

alert("Pay your debt first");

return;

}

coins+=amount;

debt=amount;

db.ref("users/"+user+"/coins").set(coins);

}


function pay(){

if(coins<debt){

alert("Not enough coins");

return;

}

coins-=debt;

debt=0;

db.ref("users/"+user+"/coins").set(coins);

}

</script>

</body>
</html>
