<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AGS Boys</title>

<style>

body{
background:black;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin:0;
}

button{
background:#002222;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
margin:5px;
}

input{
padding:8px;
margin:5px;
}

.page{
display:none;
}

.box{
height:250px;
overflow:auto;
border:1px solid #00ff9c;
margin:10px;
padding:5px;
}

.friend{
border-bottom:1px solid #00ff9c;
padding:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>AGS BOYS</h1>

<!-- LOGIN -->

<div id="login" class="page" style="display:block">

<input id="password" placeholder="Password"><br>

<button onclick="login()">Enter</button>

<br>

<button onclick="forgetPassword()">Forget Password</button>

</div>

<!-- HOME -->

<div id="home" class="page">

<h3>Coins: <span id="coins">0</span></h3>

<h3>Friends</h3>

<div id="friends"></div>

<br>

<button onclick="openPage('chat')">Public Chat</button>
<button onclick="openPage('private')">Private Chat</button>
<button onclick="openPage('games')">Games</button>
<button onclick="openPage('store')">Store</button>
<button onclick="openPage('bank')">Bank</button>
<button onclick="openPage('mail')">Mail</button>
<button onclick="openPage('films')">Films</button>

</div>

<!-- PUBLIC CHAT -->

<div id="chat" class="page">

<h2>Public Chat</h2>

<div id="messages" class="box"></div>

<input id="msg">

<button onclick="sendMessage()">Send</button>

<br><br>

<button onclick="openPage('home')">Back</button>

</div>

<!-- PRIVATE CHAT -->

<div id="private" class="page">

<h2>Private Chat</h2>

<select id="friendSelect"></select>

<div id="privateMessages" class="box"></div>

<input id="privateMsg">

<button onclick="sendPrivate()">Send</button>

<br><br>

<button onclick="openPage('home')">Back</button>

</div>

<!-- GAMES -->

<div id="games" class="page">

<h2>Games</h2>

<div id="gameLog" class="box"></div>

<button onclick="playGame()">Play Game (+10 coins)</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>

<!-- STORE -->

<div id="store" class="page">

<h2>Store</h2>

<div id="storeLog" class="box"></div>

<button onclick="buy(100,'AI Game Bots')">AI Game Bots (100)</button>
<button onclick="buy(300,'AI Chat Helper')">AI Chat Helper (300)</button>
<button onclick="buy(500,'AI Film Search')">AI Film Search (500)</button>
<button onclick="buy(1000,'AI Chat System')">AI Chat System (1000)</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>

<!-- BANK -->

<div id="bank" class="page">

<h2>Bank</h2>

<div id="bankLog" class="box"></div>

<button onclick="borrow(25)">Borrow 25</button>
<button onclick="borrow(50)">Borrow 50</button>
<button onclick="borrow(70)">Borrow 70</button>

<br>

<button onclick="pay()">Pay Debt</button>

<br>

<button onclick="openPage('home')">Back</button>

</div>

<!-- MAIL -->

<div id="mail" class="page">

<h2>Mail</h2>

<div id="mailBox" class="box"></div>

<button onclick="openPage('home')">Back</button>

</div>

<!-- FILMS -->

<div id="films" class="page">

<h2>Film Search</h2>

<input id="filmSearch">

<button onclick="searchFilm()">Search</button>

<div id="filmBox" class="box"></div>

<br>

<button onclick="openPage('home')">Back</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>

/* REPLACE WITH YOUR FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"PASTE",
authDomain:"PASTE",
databaseURL:"PASTE",
projectId:"PASTE"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let user = "user_"+Math.floor(Math.random()*100000);

let coins = 0;
let debt = 0;

const password="faimse@123";

const friends={

"fiseha":"0922986741",
"merawi":"0900044774",
"kidus":"0910003855",
"marken":"0904306090"

};

function login(){

let p=document.getElementById("password").value;

if(p===password){

openPage("home");

loadFriends();

loadCoins();

loadMessages();

loadPrivateFriends();

loadMail();

}else{

alert("Try again");

}

}

function forgetPassword(){

let num=prompt("Enter phone number of someone in the website");

let found=false;

for(let name in friends){

if(friends[name]===num){

alert("Password: "+password);

found=true;

}

}

if(!found){

alert("Number not found");

}

}

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");

document.getElementById(id).style.display="block";

}

function loadFriends(){

let f=document.getElementById("friends");

f.innerHTML="";

for(let name in friends){

let d=document.createElement("div");

d.className="friend";

d.innerText=name;

d.onclick=function(){

let p=prompt("Enter password");

if(p===password){

alert("Phone: "+friends[name]);

}

};

f.appendChild(d);

}

}

function loadCoins(){

db.ref("users/"+user+"/coins").on("value",snap=>{

coins=snap.val()||0;

document.getElementById("coins").innerText=coins;

});

}

function sendMessage(){

let t=document.getElementById("msg").value;

db.ref("messages").push({user:user,text:t});

}

function loadMessages(){

db.ref("messages").on("child_added",snap=>{

let m=snap.val();

let d=document.createElement("div");

d.innerText=m.user+" : "+m.text;

document.getElementById("messages").appendChild(d);

});

}

function loadPrivateFriends(){

let s=document.getElementById("friendSelect");

for(let n in friends){

let o=document.createElement("option");

o.value=n;

o.text=n;

s.appendChild(o);

}

}

function sendPrivate(){

let f=document.getElementById("friendSelect").value;

let text=document.getElementById("privateMsg").value;

let id=[user,f].sort().join("_");

db.ref("privateChats/"+id).push({sender:user,text:text});

}

function playGame(){

coins+=10;

db.ref("users/"+user+"/coins").set(coins);

let d=document.createElement("div");

d.innerText="You earned 10 coins";

document.getElementById("gameLog").appendChild(d);

}

function buy(price,item){

if(coins<price){

alert("Not enough coins");

return;

}

coins-=price;

db.ref("users/"+user+"/coins").set(coins);

let d=document.createElement("div");

d.innerText="Purchased "+item;

document.getElementById("storeLog").appendChild(d);

}

function borrow(a){

if(debt>0){

alert("Pay your debt first");

return;

}

coins+=a;

debt=a;

db.ref("users/"+user+"/coins").set(coins);

}

function pay(){

if(debt===0){

alert("No debt");

return;

}

if(coins<debt){

alert("Not enough coins");

return;

}

coins-=debt;

debt=0;

db.ref("users/"+user+"/coins").set(coins);

}

function loadMail(){

db.ref("mail/"+user).on("child_added",snap=>{

let m=snap.val();

let d=document.createElement("div");

d.innerText=m;

document.getElementById("mailBox").appendChild(d);

});

}

const films=["Avatar","Avengers","Batman","Spider Man","Inception","Interstellar"];

function searchFilm(){

let s=document.getElementById("filmSearch").value.toLowerCase();

let box=document.getElementById("filmBox");

box.innerHTML="";

films.forEach(f=>{

if(f.toLowerCase().includes(s)){

let d=document.createElement("div");

d.innerText=f;

box.appendChild(d);

}

});

}

</script>

</body>
</html>
